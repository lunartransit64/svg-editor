<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/artboard.css">
</head>
<body>
    <h1>SVG Editor</h1>
    <div id="navbar">
        <button id="add-rect">Add Square</button>
        <p>Artboard Size:</p>
        <input type="number" id="artboard-width" value="500" style="width: 60px;">
        <input type="number" id="artboard-height" value="500" style="width: 60px;">
    </div>
    <div id="canvas">
        <div id="canvas-container">
            <div id="artboard-border">
                <svg id="artboard" width="500" height="500">
                </svg>

                <div class="handle tl" data-axis="both"></div>
                <div class="handle tc" data-axis="y"></div>
                <div class="handle tr" data-axis="both"></div>
                <div class="handle ml" data-axis="x"></div>
                <div class="handle mr" data-axis="x"></div>
                <div class="handle bl" data-axis="both"></div>
                <div class="handle bc" data-axis="y"></div>
                <div class="handle br" data-axis="both"></div>
            </div>
        </div>
    </div>
    <div id="footer">
        <p class="txtr">Zoom: <span class="zoom-num">100</span>%</p>
    </div>

    <script src="js/artboard.js"></script>
    <script src="js/zoom.js"></script>
    <script src="js/rectangle.js"></script>
</body>
</html>
