<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/menunav.css">
</head>
<body>
    <div id="menubar">
        <button class="menu-btn active" data-target="home-panel">Home</button>
        <button class="menu-btn" data-target="artboard-panel">Artboard</button>
    </div>
    <div id="navbar">
        <div id="home-panel" class="navbar-tab active">
        </div>
        <div id="artboard-panel" class="navbar-tab">
            <p>Artboard Size:</p>
            <input type="number" id="artboard-width" value="500" style="width: 60px;">
            <input type="number" id="artboard-height" value="500" style="width: 60px;">
            
            <label for="artboard-presets" style="margin-left: 12px;";>Preset:</label>
            <select id="artboard-presets">
                <option value="custom">Custom</option>
                <option value="1920x1080">Full HD (16:9)</option>
                <option value="1080x1920">Full HD (9:16)</option>
                <option value="2100x2970">A4 Portrait</option>
                <option value="2970x2100">A4 Landscape</option>
                <option value="2970x4200">A3 Portrait</option>
                <option value="4200x2970">A3 Landscape</option>
            </select>
        </div>
    </div>
    <div id="canvas">
        <div id="canvas-container">
            <div id="artboard-border">
                <svg id="artboard" width="500" height="500">
                </svg>

                <div class="handle tl" data-axis="both"></div>
                <div class="handle tc" data-axis="y"></div>
                <div class="handle tr" data-axis="both"></div>
                <div class="handle ml" data-axis="x"></div>
                <div class="handle mr" data-axis="x"></div>
                <div class="handle bl" data-axis="both"></div>
                <div class="handle bc" data-axis="y"></div>
                <div class="handle br" data-axis="both"></div>
            </div>
        </div>
    </div>
    <div id="footer">
        <p class="txtr">Zoom: <span class="zoom-num">100</span>%</p>
    </div>
    
    <script src="js/menubar.js"></script>
    
    <script src="js/artboard.js"></script>
    <script src="js/artboard-handle.js"></script>
    
    <script src="js/zoom.js"></script>
    <script src="js/rectangle.js"></script>
</body>
</html>
