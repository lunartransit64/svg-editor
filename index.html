<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG Editor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>SVG Editor</h1>
    <div id="navbar">
        <button id="add-rect">Add Square</button>
        <p>Artboard Size:</p>
        <input type="number" id="artboard-width" value="500" style="width: 60px;">
        <input type="number" id="artboard-height" value="500" style="width: 60px;">
    </div>
    <div id="canvas">
        <svg id="artboard" width="500" height="500">
        </svg>
    </div>
    <div id="footer">
        <p class="txtr">Zoom: 100%</p>
    </div>

    <script src="js/artboard.js"></script>
</body>
</html>
